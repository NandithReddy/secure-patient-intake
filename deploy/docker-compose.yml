# Two containers: the FastAPI backend, and Caddy in front of it for HTTPS.
# Run from this folder with:  docker compose up -d --build
#
# Values come from a .env file next to this one (see .env.example).

services:
  backend:
    build:
      context: ..              # repo root — the Dockerfile copies deid/ and service/
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    environment:
      DEID_ENV: production
      DEID_JWT_SECRET: ${DEID_JWT_SECRET}
      DEID_FIELD_KEY: ${DEID_FIELD_KEY}
      DEID_CORS_ORIGINS: ${DEID_CORS_ORIGINS}
    volumes:
      # The trained model, mounted read-only from the host. It is NOT baked into
      # the image (it is gitignored and large). Put it on the VPS at ../models.
      - ../models:/app/models:ro
      # The database and audit log live in a named volume so they SURVIVE
      # restarts and rebuilds. Never bind this to the repo — it is real data.
      - deid-data:/app/data
    expose:
      - "8000"                 # internal only; Caddy is the public entrance

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    environment:
      BACKEND_DOMAIN: ${BACKEND_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data       # stores the HTTPS certificates (must persist)
      - caddy-config:/config

volumes:
  deid-data:
  caddy-data:
  caddy-config:
